<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Yeon+Sung&display=swap');
    </style>
</head>
<body class="yeon-sung-regular">

    <div class="container">
        <div class="site-nav">
            <a href="./index.html" class="home-btn">🏠 Home</a>
            <nav>
                <ul>
                    <li><a href="./signUp.html" class="current">👤 가입</a></li>
                    
                    <li class="dropdown">
                        <a href="#" class="dropdown-toggle">☰ 목록</a>
                        <ul class="dropdown-menu">
                            <li><a href="./myProfile.html">👨 소개</a></li>
                            <li><a href="./myClass.html">🗓️ 시간표</a></li>
                            <li><a href="./myHoliday.html">🏖️ 휴일</a></li>
                            <li><a href="./myTrip.html">🛫 앨범</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
        </div>
        <h1>👤 회원가입</h1>
        <p class="signup-welcome">SKALA-FRONT 회원가입을 환영합니다.</p>
        <hr>
        
        <form class="signup-form" onsubmit="submitComplete()">

            <fieldset class="form-group">
                <legend class="group-title">계정 정보</legend>
                <div class="form-row">
                    <label for="userId">아이디 <small class="required">(필수)</small></label>
                    <input type="text" id="userId" name="userId" minlength="4" maxlength="15" required placeholder="4~15자 영문/숫자">
                </div>
                <div class="form-row">
                    <label for="userPw">비밀번호 <small class="required">(필수)</small></label>
                    <input type="password" id="userPw" name="userPw" minlength="8" required placeholder="8자 이상 입력">
                </div>
                <div class="form-row">
                    <label for="userEmail">이메일</label>
                    <div class="email-input-group">
                        <input type="text" id="userEmail" name="userEmail" placeholder="example">
                        <span class="at">@</span>
                        <select name="emailDomain" id="emailDomain">
                            <option value="direct">직접 입력</option>
                            <option value="naver.com">naver.com</option>
                            <option value="gmail.com">gmail.com</option>
                            <option value="daum.net">daum.net</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-group">
                <legend class="group-title">개인 프로필 정보</legend>
                <div class="form-row">
                    <label for="userName">이름 <small class="required">(필수)</small></label>
                    <input type="text" id="userName" name="userName" required>
                </div>
                <div class="form-row">
                    <label for="userBirth">생년월일</label>
                    <input type="date" id="userBirth" name="userBirth">
                </div>
                <div class="form-row">
                    <span class="label-mock">성별</span>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="gender" value="male" checked> 남성</label>
                        <label class="radio-label"><input type="radio" name="gender" value="female"> 여성</label>
                        <label class="radio-label"><input type="radio" name="gender" value="none"> 선택안함</label>
                    </div>
                </div>
                <div class="form-row">
                    <span class="label-mock">관심 분야 <small>(중복 선택 가능)</small></span>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label>
                        <label class="checkbox-label"><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label>
                        <label class="checkbox-label"><input type="checkbox" name="interest" value="backend"> 백엔드 & 데이터베이스</label>
                        <label class="checkbox-label"><input type="checkbox" name="interest" value="devops"> 클라우드 & 인프라</label>
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-group">
                <legend class="group-title">자기소개</legend>
                <div class="form-row">
                    <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사</label>
                    <textarea id="intro" name="intro" rows="5" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
                </div>
            </fieldset>

            <div class="button-group">
                <input type="submit" value="동의하고 회원가입" class="btn btn-submit">
                <input type="reset" value="다시 작성" class="btn btn-reset">
            </div>
        </form>

        <footer class="site-footer">
            <address>
                이메일 문의 :
                <a href="mailto:ymkim7756@naver.com">ymkim7756@naver.com</a>
            </address>
            <p>&copy; 2026 김영민의 포트폴리오.</p>
        </footer>
    </div>
    <script>
        function submitComplete(){
            alert("🎉 회원가입이 완료되었습니다.")
        }
    </script>
</body>
</html>
